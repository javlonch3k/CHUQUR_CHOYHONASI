<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CHUQUR CHOYHONASI — Menyu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- HEADER -->
<header class="uzbek-pattern">
  <div class="header-inner">
    <div class="header-badge">🫖 Xush kelibsiz</div>
    <h1><span class="header-title-shimmer">CHUQUR CHOYHONASI</span></h1>
    <p>An'anaviy o'zbek taomlari va ichimliklar</p>
    <div class="gold-ornament">✦ ✦ ✦</div>
  </div>
</header>
<div class="tile-band"></div>

<!-- KATEGORIYALAR -->
<div class="cats-wrap">
  <div class="cats-title">Kategoriyalar</div>
  <div class="cats-scroll" id="tabs"></div>
</div>

<!-- TAOMLAR -->
<div id="container"></div>

<!-- FOOTER -->
<div class="footer-wrap">
  <div class="gold-ornament">✦ ✦ ✦</div>
  <div class="footer-name">CHUQUR CHOYHONASI — Sifatli xizmat va mazali taomlar</div>
  <div class="footer-info">📍 Qarshi shahri | 📞 +998 XX XXX XX XX</div>
  <div class="footer-copy" id="adminTap">CHUQUR CHOYHONASI © 2024</div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="sheet">
    <div class="sh-handle"></div>
    <button class="close-x" onclick="document.getElementById('overlay').classList.remove('open')">✕</button>
    <div id="shImg"></div>
    <div class="sheet-body">
      <div id="shBadge"></div>
      <div class="sh-name" id="shName"></div>
      <div class="sh-desc" id="shDesc"></div>
      <div class="sh-price-row"><div class="sh-price" id="shPrice"></div><div class="sh-tag">Narxi</div></div>
    </div>
  </div>
</div>

<script src="menu-data.js"></script>
<script src="app.js"></script>
<script>
(function(){
  var t=0,last=0;
  document.getElementById('adminTap').addEventListener('click',function(){
    var now=Date.now();
    t=(now-last<600)?t+1:1;
    last=now;
    if(t>=4){t=0;window.location.href='admin.html';}
  });
})();
</script>
</body>
</html>
