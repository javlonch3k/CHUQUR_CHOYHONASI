<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHUQUR CHOYHONASI - Menyu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="container">
            <a href="index.html" class="site-logo">CHUQUR<span class="logo-accent">.MENU</span></a>
        </div>
    </div>

    <!-- Navigation / Categories -->
    <nav class="nav-bar">
        <div class="container">
            <div class="nav-list" id="categories-nav"></div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container">
        <div class="poster-grid" id="menu-grid"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p id="secret-admin" style="cursor:default">CHUQUR CHOYHONASI &copy; 2024 | Qarshi shahri</p>
            <p>📞 +998 XX XXX XX XX</p>
        </div>
    </footer>

    <script src="menu-data.js"></script>
    <script src="app.js"></script>
    <script>
        let tapCount = 0, tapTimer = null;
        document.getElementById('secret-admin').addEventListener('click', () => {
            tapCount++;
            if (tapTimer) clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 2000);
            if (tapCount >= 4) { tapCount = 0; window.location.href = 'admin.html'; }
        });
    </script>
</body>
</html>
