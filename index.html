<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHUQUR CHOYHONASI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo">CHUQUR<span>.MENU</span></div>
        </div>
        <div class="categories-nav" id="categories-nav"></div>
    </header>

    <main>
        <div class="menu-grid" id="menu-grid"></div>
    </main>

    <footer>
        <p id="secret-admin" style="cursor:default">📍 Qarshi shahri</p>
        <p>📞 +998 XX XXX XX XX</p>
    </footer>

    <script src="menu-data.js"></script>
    <script src="app.js"></script>
    <script>
        let tapCount = 0;
        let tapTimer = null;
        document.getElementById('secret-admin').addEventListener('click', () => {
            tapCount++;
            if (tapTimer) clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 2000);
            if (tapCount >= 4) {
                tapCount = 0;
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
